<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}SRDF{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load static %}
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        .layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: #111827;
            padding: 20px;
            border-right: 1px solid #1f2937;
        }

        .content {
            padding: 24px;
        }

        a {
            color: #93c5fd;
            text-decoration: none;
        }

        .nav {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-link {
            display: block;
            padding: 8px 10px;
            border-radius: 6px;
            background: #1f2937;
        }

        .nav-link:hover {
            background: #374151;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            {% block side_left_menu %}{% endblock %}
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block bottom_javascript %}{% endblock %}
</body>
</html>
